[toolchain]
anchor_version  = "0.31.1"
solana_version  = "2.3.0"
package_manager = "yarn"

[features]
seeds           = false
skip-lint       = false

[programs.localnet]
vault_key           = "MSL1yHXY3tn1fXBg52v2GgGA2qNuQofBMoehEf8arjw"
guardian_multisig   = "MSLLafYHvuDb1kkukoEijtnERRScQn2n6x7YyH2mMhX"
monasol_protocol    = "MSL3a81xY93z7zzqFEjxh1EyUo2mUJeQ6xc8UAQRba9"

[programs.devnet]
vault_key           = "MSL1yHXY3tn1fXBg52v2GgGA2qNuQofBMoehEf8arjw"
guardian_multisig   = "MSLLafYHvuDb1kkukoEijtnERRScQn2n6x7YyH2mMhX"
monasol_protocol    = "MSL3a81xY93z7zzqFEjxh1EyUo2mUJeQ6xc8UAQRba9"

[registry]
url = "https://api.apr.dev"

[provider]
cluster  = "devnet"
wallet   = "~/.config/solana/id.json"

[scripts]
test  = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
# platform-tools v1.52+ required (Cargo 1.85+, edition2024 support)
# Usage: anchor run build
build = "cargo-build-sbf --tools-version v1.52 --manifest-path programs/vault_key/Cargo.toml && cargo-build-sbf --tools-version v1.52 --manifest-path programs/guardian_multisig/Cargo.toml && cargo-build-sbf --tools-version v1.52 --manifest-path programs/monasol_protocol/Cargo.toml"

[workspace]
types = "target/types"
