[toolchain]
anchor_version  = "0.31.1"
solana_version  = "2.1.0"

[features]
seeds           = false
skip-lint       = false

[programs.localnet]
vault_key           = "VKEYxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
guardian_multisig   = "GMSIGxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
monasol_protocol    = "MSOLPxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Uncomment and populate after `anchor keys list` on devnet
# [programs.devnet]
# vault_key           = ""
# guardian_multisig   = ""
# monasol_protocol    = ""

[registry]
url = "https://api.apr.dev"

[provider]
cluster  = "localnet"
wallet   = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
types = "target/types"
